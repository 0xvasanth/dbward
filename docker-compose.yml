services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbward
      POSTGRES_PASSWORD: dbward
      POSTGRES_DB: dbward_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbward -d dbward_test"]
      interval: 2s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: dbward_root
      MYSQL_DATABASE: dbward_test
      MYSQL_USER: dbward
      MYSQL_PASSWORD: dbward
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dbward", "-pdbward"]
      interval: 3s
      timeout: 5s
      retries: 30

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dbward_Test_123!"
      MSSQL_PID: "Developer"
    ports:
      - "11433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dbward_Test_123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: dbward
      MONGO_INITDB_ROOT_PASSWORD: dbward
    ports:
      - "37017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 3s
      timeout: 5s
      retries: 20
