name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, format, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  integration:
    name: Integration tests (docker)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start database containers
        run: docker compose up -d

      - name: Wait for containers to be healthy
        run: |
          for i in $(seq 1 60); do
            unhealthy=$(docker compose ps --format json | jq -r 'select(.Health != "healthy" and .Health != "") | .Name' | wc -l)
            if [ "$unhealthy" -eq 0 ]; then
              echo "All containers healthy"
              exit 0
            fi
            echo "Waiting for containers... ($i)"
            sleep 2
          done
          echo "Timed out waiting for containers"
          docker compose ps
          exit 1

      - name: Run integration tests
        env:
          TEST_INTEGRATION: '1'
        run: npm test

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down -v
