name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm on version change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Read package metadata
        id: meta
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        env:
          PKG_NAME: ${{ steps.meta.outputs.name }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          published=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
          if [ "$published" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published; skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $PKG_VERSION is new; will publish."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true'
        run: npm ci

      - name: Verify build and tests
        if: steps.check.outputs.changed == 'true'
        run: |
          npm run lint
          npm run format:check
          npm run typecheck
          npm run build
          npm test

      - name: Publish to npm
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create git tag and GitHub release
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          tag="v$PKG_VERSION"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping release."
            exit 0
          fi
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes
