name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm on version change
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Read package metadata
        id: meta
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if npm publish is needed
        id: publish_check
        env:
          PKG_NAME: ${{ steps.meta.outputs.name }}
          PKG_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          published=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
          if [ "$published" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already on npm; skipping publish."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $PKG_VERSION is new on npm; will publish."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if git tag is needed
        id: tag_check
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already on origin; skipping tag."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG missing on origin; will create."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if GitHub release is needed
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping release."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG missing; will create."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.publish_check.outputs.needed == 'true'
        run: npm ci

      - name: Verify build and tests
        if: steps.publish_check.outputs.needed == 'true'
        run: |
          npm run lint
          npm run format:check
          npm run typecheck
          npm run build
          npm test

      - name: Publish to npm
        if: steps.publish_check.outputs.needed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create and push git tag
        if: steps.tag_check.outputs.needed == 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.release_check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
